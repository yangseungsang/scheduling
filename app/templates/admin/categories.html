{% extends "base.html" %}
{% block title %}카테고리 관리 - 스케줄링{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>카테고리 관리</h2>
  <a href="{{ url_for('admin.category_new') }}" class="btn btn-primary">카테고리 추가</a>
</div>

<table class="table table-hover">
  <thead>
    <tr>
      <th>색상</th>
      <th>이름</th>
      <th>액션</th>
    </tr>
  </thead>
  <tbody>
    {% for cat in categories %}
    <tr>
      <td><span class="badge" style="background-color: {{ cat.color }}">&nbsp;&nbsp;&nbsp;</span></td>
      <td>{{ cat.name }}</td>
      <td>
        <a href="{{ url_for('admin.category_edit', cat_id=cat.id) }}" class="btn btn-sm btn-outline-primary">수정</a>
        <form method="POST" action="{{ url_for('admin.category_delete', cat_id=cat.id) }}" class="d-inline"
              onsubmit="return confirm('정말 삭제하시겠습니까?')">
          <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
