{% extends "base.html" %}
{% block title %}{{ '카테고리 수정' if category else '카테고리 추가' }} - 스케줄링{% endblock %}

{% block content %}
<h2>{{ '카테고리 수정' if category else '카테고리 추가' }}</h2>
<form method="POST" class="mt-3" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">이름</label>
    <input type="text" class="form-control" name="name" value="{{ category.name if category else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">색상</label>
    <input type="color" class="form-control form-control-color" name="color" value="{{ category.color if category else '#28a745' }}">
  </div>
  <button type="submit" class="btn btn-primary">저장</button>
  <a href="{{ url_for('admin.categories') }}" class="btn btn-secondary">취소</a>
</form>
{% endblock %}
