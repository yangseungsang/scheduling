{% extends "base.html" %}
{% block title %}{{ '팀원 수정' if user else '팀원 추가' }} - 스케줄링{% endblock %}

{% block content %}
<h2>{{ '팀원 수정' if user else '팀원 추가' }}</h2>
<form method="POST" class="mt-3" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">이름</label>
    <input type="text" class="form-control" name="name" value="{{ user.name if user else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">역할</label>
    <input type="text" class="form-control" name="role" value="{{ user.role if user else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">색상</label>
    <input type="color" class="form-control form-control-color" name="color" value="{{ user.color if user else '#4A90D9' }}">
  </div>
  <button type="submit" class="btn btn-primary">저장</button>
  <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">취소</a>
</form>
{% endblock %}
