{% extends "base.html" %}
{% block title %}{{ '업무 수정' if task else '업무 추가' }} - 스케줄링{% endblock %}

{% block content %}
<h2>{{ '업무 수정' if task else '업무 추가' }}</h2>
<form method="POST" class="mt-3" style="max-width: 500px;">
  <div class="mb-3">
    <label class="form-label">제목</label>
    <input type="text" class="form-control" name="title" value="{{ task.title if task else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">설명</label>
    <textarea class="form-control" name="description" rows="3">{{ task.description if task else '' }}</textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">담당자</label>
    <select name="assignee_id" class="form-select">
      <option value="">선택 안 함</option>
      {% for u in users %}
      <option value="{{ u.id }}" {{ 'selected' if task and task.assignee_id == u.id }}>{{ u.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">카테고리</label>
    <select name="category_id" class="form-select">
      <option value="">선택 안 함</option>
      {% for c in categories %}
      <option value="{{ c.id }}" {{ 'selected' if task and task.category_id == c.id }}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">우선순위</label>
    <select name="priority" class="form-select">
      <option value="high" {{ 'selected' if task and task.priority == 'high' }}>높음</option>
      <option value="medium" {{ 'selected' if (not task) or (task and task.priority == 'medium') }}>보통</option>
      <option value="low" {{ 'selected' if task and task.priority == 'low' }}>낮음</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">예상 시간</label>
    <input type="number" class="form-control" name="estimated_hours" min="0" step="0.5"
           value="{{ task.estimated_hours if task else '' }}">
  </div>
  {% if task %}
  <div class="mb-3">
    <label class="form-label">잔여 시간</label>
    <input type="number" class="form-control" name="remaining_hours" min="0" step="0.5"
           value="{{ task.remaining_hours }}">
  </div>
  <div class="mb-3">
    <label class="form-label">상태</label>
    <select name="status" class="form-select">
      <option value="waiting" {{ 'selected' if task.status == 'waiting' }}>대기</option>
      <option value="in_progress" {{ 'selected' if task.status == 'in_progress' }}>진행 중</option>
      <option value="completed" {{ 'selected' if task.status == 'completed' }}>완료</option>
    </select>
  </div>
  {% endif %}
  <div class="mb-3">
    <label class="form-label">마감일</label>
    <input type="date" class="form-control" name="deadline"
           value="{{ task.deadline if task else '' }}">
  </div>
  <button type="submit" class="btn btn-primary">저장</button>
  {% if task %}
  <a href="{{ url_for('tasks.task_detail', task_id=task.id) }}" class="btn btn-secondary">취소</a>
  {% else %}
  <a href="{{ url_for('tasks.task_list') }}" class="btn btn-secondary">취소</a>
  {% endif %}
</form>
{% endblock %}
