{% extends "schedule/base.html" %}
{% block title %}버전 관리 - 스케줄링{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>버전 관리</h4>
  <button class="btn btn-sm btn-outline-primary" id="btn-sync-versions" onclick="syncVersions()">
    <i class="bi bi-arrow-repeat"></i> 외부 동기화
  </button>
</div>

{% if versions %}
<div class="card" style="max-width:500px">
  <div class="card-body">
    <table class="table table-borderless mb-0">
      <tr><th style="width:100px">버전명</th><td class="fw-bold">{{ versions[0].name }}</td></tr>
      <tr><th>설명</th><td>{{ versions[0].description or '-' }}</td></tr>
    </table>
  </div>
</div>
{% else %}
<div class="text-muted">등록된 버전이 없습니다. 외부 동기화를 실행해주세요.</div>
{% endif %}
{% endblock %}

{% block scripts %}
<script>
function syncVersions() {
  fetch('/api/sync/versions', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      alert('동기화 완료: 추가 ' + data.added + ', 업데이트 ' + data.updated + ', 비활성화 ' + data.deactivated);
      location.reload();
    })
    .catch(function(err) { alert('동기화 실패: ' + err.message); });
}
</script>
{% endblock %}
