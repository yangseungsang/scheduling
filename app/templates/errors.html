{% extends "base.html" %}
{% block title %}{{ error_code }} - 오류{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-muted">{{ error_code }}</h1>
        <p class="fs-4 text-secondary">{{ error_message }}</p>
        <a href="{{ url_for('schedule.day_view') }}" class="btn btn-primary mt-3">
            <i class="bi bi-house" aria-hidden="true"></i> 홈으로 돌아가기
        </a>
    </div>
</div>
{% endblock %}
