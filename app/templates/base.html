<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}업무 스케줄러{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{{ url_for('schedule.day_view') }}">
            <i class="bi bi-calendar3"></i> 업무 스케줄러
        </a>
        <div class="navbar-nav flex-row gap-3 ms-auto">
            <a class="nav-link text-white" href="{{ url_for('schedule.day_view') }}"><i class="bi bi-calendar-day"></i> 일간</a>
            <a class="nav-link text-white" href="{{ url_for('schedule.week_view') }}"><i class="bi bi-calendar-week"></i> 주간</a>
            <a class="nav-link text-white" href="{{ url_for('schedule.month_view') }}"><i class="bi bi-calendar-month"></i> 월간</a>
            <a class="nav-link text-white" href="{{ url_for('tasks.task_list') }}"><i class="bi bi-list-task"></i> 업무</a>
            <a class="nav-link text-white" href="{{ url_for('admin.settings') }}"><i class="bi bi-gear"></i> 설정</a>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="{{ url_for('static', filename='js/drag_drop.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
