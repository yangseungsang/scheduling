<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}업무 스케줄러{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="메인 내비게이션">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{{ url_for('schedule.week_view') }}">
            <i class="bi bi-calendar3" aria-hidden="true"></i> 업무 스케줄러
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="메뉴 열기">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <div class="navbar-nav ms-auto gap-md-2">
                <a class="nav-link {% if request.endpoint and request.endpoint.startswith('schedule.week') %}active{% endif %}" {% if request.endpoint and request.endpoint.startswith('schedule.week') %}aria-current="page"{% endif %} href="{{ url_for('schedule.week_view') }}"><i class="bi bi-calendar-week" aria-hidden="true"></i> 주간</a>
                <a class="nav-link {% if request.endpoint and request.endpoint.startswith('schedule.month') %}active{% endif %}" {% if request.endpoint and request.endpoint.startswith('schedule.month') %}aria-current="page"{% endif %} href="{{ url_for('schedule.month_view') }}"><i class="bi bi-calendar-month" aria-hidden="true"></i> 월간</a>
                <a class="nav-link {% if request.endpoint and request.endpoint.startswith('tasks.') %}active{% endif %}" {% if request.endpoint and request.endpoint.startswith('tasks.') %}aria-current="page"{% endif %} href="{{ url_for('tasks.task_list') }}"><i class="bi bi-list-task" aria-hidden="true"></i> 업무</a>
                <a class="nav-link {% if request.endpoint and request.endpoint.startswith('admin.') %}active{% endif %}" {% if request.endpoint and request.endpoint.startswith('admin.') %}aria-current="page"{% endif %} href="{{ url_for('admin.settings') }}"><i class="bi bi-gear" aria-hidden="true"></i> 설정</a>
            </div>
        </div>
    </div>
</nav>

<main class="container-fluid py-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="닫기"></button>
        </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script defer src="{{ url_for('static', filename='js/drag_drop.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
