<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}시험 실행{% endblock %}</title>
  <link href="{{ url_for('static', filename='schedule/vendor/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='schedule/vendor/bootstrap-icons.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='execution/css/style.css') }}?v={{ cache_bust }}" rel="stylesheet">
  {% block head %}{% endblock %}
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; margin: 0; }
    body > main { flex: 1; overflow: hidden; min-height: 0; }
  </style>
</head>
<body>
  <div class="exec-toolbar">
    <div class="exec-toolbar-brand">
      <div class="brand-icon"><i class="bi bi-play-fill"></i></div>
      <div>
        <div class="brand-title">시험 실행</div>
        <div class="brand-subtitle">Test Execution System</div>
      </div>
    </div>
    <div class="exec-toolbar-right">
      {% block toolbar_right %}{% endblock %}
    </div>
  </div>

  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='schedule/vendor/bootstrap.bundle.min.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
