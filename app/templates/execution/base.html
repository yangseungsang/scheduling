<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}시험 실행{% endblock %}</title>
  <link href="{{ url_for('static', filename='schedule/vendor/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='schedule/vendor/bootstrap-icons.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='execution/css/style.css') }}?v={{ cache_bust }}" rel="stylesheet">
  {% block head %}{% endblock %}
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; margin: 0; }
    body > main { flex: 1; overflow: hidden; min-height: 0; }
  </style>
</head>
<body>
  <div class="exec-toolbar">
    <div class="exec-toolbar-brand">
      <div class="brand-icon"><i class="bi bi-play-fill"></i></div>
      <div>
        <div class="brand-title">시험 실행</div>
        <div class="brand-subtitle">Test Execution System</div>
      </div>
    </div>
    <div class="exec-toolbar-right">
      <button id="toolbar-user-btn" class="btn btn-sm btn-outline-light me-2" onclick="openUserModal()" title="사용자 변경">
        <i class="bi bi-person-circle me-1"></i><span id="toolbar-username">…</span>
      </button>
      {% block toolbar_right %}{% endblock %}
    </div>
  </div>

  <!-- 사용자 선택 모달 -->
  <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="userModalLabel"><i class="bi bi-person-fill me-1"></i>사용자 선택</h6>
          <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-2">
          <input type="text" id="user-modal-input" class="form-control form-control-sm" placeholder="이름 입력…" onkeydown="if(event.key==='Enter')applyUserFromModal()">
        </div>
        <div class="modal-footer py-2">
          <button type="button" class="btn btn-primary btn-sm w-100" onclick="applyUserFromModal()">
            <i class="bi bi-check-lg me-1"></i>선택
          </button>
        </div>
      </div>
    </div>
  </div>

  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='schedule/vendor/bootstrap.bundle.min.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
