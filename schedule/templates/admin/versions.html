{% extends "base.html" %}
{% block title %}버전 관리 - 스케줄링{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>버전 관리</h4>
  <div>
    <button class="btn btn-sm btn-outline-primary me-2" id="btn-sync-versions" onclick="syncVersions()">
      <i class="bi bi-arrow-repeat"></i> 외부 동기화
    </button>
    <a href="{{ url_for('admin.version_new') }}" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg"></i> 버전 추가
    </a>
  </div>
</div>
<table class="table">
  <thead>
    <tr><th>버전명</th><th>설명</th><th>상태</th><th></th></tr>
  </thead>
  <tbody>
    {% for v in versions %}
    <tr>
      <td>{{ v.name }}</td>
      <td>{{ v.description or '-' }}</td>
      <td>
        {% if v.is_active %}
        <span class="badge bg-success">활성</span>
        {% else %}
        <span class="badge bg-secondary">비활성</span>
        {% endif %}
      </td>
      <td>
        <a href="{{ url_for('admin.version_edit', version_id=v.id) }}" class="btn btn-sm btn-outline-primary">수정</a>
        <form method="POST" action="{{ url_for('admin.version_delete', version_id=v.id) }}" class="d-inline" onsubmit="return confirm('삭제하시겠습니까?')">
          <button class="btn btn-sm btn-outline-danger">삭제</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
function syncVersions() {
  fetch('/api/sync/versions', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      alert('동기화 완료: 추가 ' + data.added + ', 업데이트 ' + data.updated + ', 비활성화 ' + data.deactivated);
      location.reload();
    })
    .catch(function(err) { alert('동기화 실패: ' + err.message); });
}
</script>
{% endblock %}
