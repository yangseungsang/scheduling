{% if locations %}
<div class="loc-filter">
  <span class="loc-filter-label">장소</span>
  <button class="loc-filter-btn active" data-loc-id="" title="전체">전체</button>
  {% for loc in locations %}
  <button class="loc-filter-btn" data-loc-id="{{ loc.id }}" title="{{ loc.description or loc.name }}">
    <span class="loc-filter-dot" style="background:{{ loc.color }}"></span>{{ loc.name }}
  </button>
  {% endfor %}
</div>
<script>
(function() {
  // Collect all known location IDs in order
  var locIds = [];
  document.querySelectorAll('.loc-filter-btn[data-loc-id]').forEach(function(b) {
    if (b.dataset.locId) locIds.push(b.dataset.locId);
  });

  function layoutBlocks(filterLocId) {
    // Determine visible locations
    var visibleLocs = filterLocId ? [filterLocId] : locIds;
    var locCount = visibleLocs.length || 1;

    // Process all schedule-blocks (week view) and month-block-items (month view)
    var blocks = document.querySelectorAll('.week-block[data-location-id], .schedule-block[data-location-id]');
    blocks.forEach(function(el) {
      // Skip day-view blocks (inside .day-loc-body)
      if (el.closest('.day-loc-body')) return;

      var blockLoc = el.dataset.locationId;
      var locIndex = visibleLocs.indexOf(blockLoc);

      if (locIndex === -1) {
        el.style.display = 'none';
        return;
      }

      el.style.display = '';
      var subWidth = 100.0 / locCount;
      el.style.left = (subWidth * locIndex) + '%';
      el.style.width = subWidth + '%';
      el.style.right = 'auto';
    });

    // Month blocks: show/hide
    document.querySelectorAll('.month-block-item[data-location-id]').forEach(function(el) {
      var blockLoc = el.dataset.locationId;
      if (!filterLocId || blockLoc === filterLocId) {
        el.style.display = '';
      } else {
        el.style.display = 'none';
      }
    });
  }

  // Filter button clicks
  var btns = document.querySelectorAll('.loc-filter-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      layoutBlocks(btn.dataset.locId);
    });
  });

  // Initial layout after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { layoutBlocks(''); });
  } else {
    layoutBlocks('');
  }
})();
</script>
{% endif %}
